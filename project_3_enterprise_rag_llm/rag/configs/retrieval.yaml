# ============================================
# Retrieval Stack Config (D5)
# ============================================

# Versioning (must be written to audit and response)
index_version_prefix: "index_v"   # index_vYYYY_MM_DD
prompt_version_prefix: "prompt_v"
retriever_version_prefix: "retriever_v"
router_version_prefix: "router_v"

# BM25
bm25:
  k1: 1.5
  b: 0.75
  top_k: 20

# Dense (sentence-transformers + FAISS/Qdrant)
dense:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_dim: 384
  top_k: 20
  index_type: "qdrant"  # qdrant (prod) | faiss

# Rerank (optional cross-encoder)
rerank:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 6

# Hybrid
hybrid:
  bm25_weight: 0.4
  dense_weight: 0.6
  final_top_k: 10
