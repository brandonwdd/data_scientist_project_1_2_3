# ============================================
# Churn Promotion Gate Configuration
# ============================================

# Churn Model Metrics
churn:
  pr_auc_min: 0.45
  auc_min: 0.82
  ece_max: 0.05
  brier_max: 0.18
  topk_precision_10pct_min: 0.65
  lift_10pct_min: 3.2

# LTV Model Metrics
ltv:
  smape_max: 0.30
  mae_max: 100.0  # Adjust based on LTV scale

# Decisioning Metrics
decisioning:
  profit_uplift_min: 0.12  # +12% vs baseline policy
  budget_utilization_min: 0.85
  offer_fp_rate_max: 0.20

# Data Quality
data_quality:
  missing_rate_max: 0.015  # 1.5%
  schema_drift_max: 0  # No schema drift allowed
  domain_set_violations_max: 0

# SLO
slo:
  latency_p95_max_ms: 120
  error_rate_5xx_max: 0.005  # 0.5%

# Cooldown (days)
cooldown_days: 14

# Required Artifacts
required_artifacts:
  - metrics.json
  - confusion_matrix.png
  - pr_curve.png
  - calibration_curve.png
  - lift_curve_topk.png
  - profit_curve.png
  - offer_mix.png
  - segment_stability.csv
  - shap_summary.png
  - data_quality_report.json
  - drift_baseline.json
  - model_card.md
