global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ds-platform'
    environment: '${ENVIRONMENT:-development}'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ML Platform Services
  # These targets will be added when services are deployed
  - job_name: 'ds-platform-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          # Add service endpoints here when deployed
          # Example:
          # - 'churn-service:8000'
          # - 'fraud-service:8001'
          # - 'rag-service:8002'
        labels:
          service_type: 'ds-platform'

  # RAG service (latency, tokens, ask count)
  - job_name: 'rag-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          service: 'rag'

  # MLflow (if exposing metrics)
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'mlflow'

  # Optional: Redis metrics (if redis_exporter is deployed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Optional: Postgres metrics (if postgres_exporter is deployed)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
