groups:
  - name: ds_platform_alerts
    interval: 30s
    rules:
      # Service Availability
      - alert: ServiceDown
        expr: up{job="ds-platform-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Service {{ $labels.instance }} has been down for more than 2 minutes."

      # API Latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.12
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "p95 latency is {{ $value }}s (threshold: 0.12s) for service {{ $labels.service }}"

      - alert: CriticalLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.24
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical API latency"
          description: "p95 latency is {{ $value }}s (threshold: 0.24s) for service {{ $labels.service }}"

      # Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.005
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for service {{ $labels.service }}"

      - alert: CriticalErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate"
          description: "Error rate is {{ $value | humanizePercentage }} for service {{ $labels.service }}"

      # Database Connection
      - alert: DatabaseConnectionFailure
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failure"
          description: "PostgreSQL database is unreachable"

      # Redis Connection
      - alert: RedisConnectionFailure
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection failure"
          description: "Redis is unreachable"

      # Async Job Failures
      - alert: HighAsyncJobFailureRate
        expr: rate(async_jobs_total{status="failed"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High async job failure rate"
          description: "Async job failure rate is {{ $value }} jobs/sec for domain {{ $labels.domain }}"

      # Feature Store TTL Expiration
      - alert: FeatureStoreTTLExpiring
        expr: count(online_features_total{ttl_expiring="true"}) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Many features expiring soon"
          description: "{{ $value }} features are about to expire in domain {{ $labels.domain }}"

  - name: ds_platform_slo
    interval: 1m
    rules:
      # SLO: Sync API p95 <= 120ms (Fraud: 80ms)
      - alert: SLOLatencyViolation
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service=~"churn-service|rag-service"}[5m])) > 0.12
          OR
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="fraud-service"}[5m])) > 0.08
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SLO latency violation"
          description: "Service {{ $labels.service }} violates latency SLO"

      # SLO: 5xx <= 0.5%
      - alert: SLOErrorRateViolation
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.005
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SLO error rate violation"
          description: "Service {{ $labels.service }} violates error rate SLO (5xx > 0.5%)"
