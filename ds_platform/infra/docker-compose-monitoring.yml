services:
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: infra-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
    depends_on:
      - redis
    networks:
      - ds-platform-network
    restart: unless-stopped

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: infra-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-dsplatform}:${POSTGRES_PASSWORD:-dsplatform_dev}@postgres:5432/${POSTGRES_DB:-dsplatform}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ds-platform-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: infra-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ds-platform-network
    restart: unless-stopped

volumes:
  grafana_data:
