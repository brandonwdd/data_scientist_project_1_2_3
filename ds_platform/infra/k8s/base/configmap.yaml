apiVersion: v1
kind: ConfigMap
metadata:
  name: ds-platform-config
  namespace: ds-platform
data:
  # Environment
  ENVIRONMENT: "production"
  
  # Application
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  
  # Feature Store
  FEATURE_STORE_OFFLINE_PATH: "s3://lake-prod/features"
  FEATURE_STORE_ONLINE_TTL_HOURS: "24"
  
  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  
  # Prometheus
  PROMETHEUS_ENABLED: "true"
  
  # Worker Configuration
  WORKER_CONCURRENCY: "4"
  MAX_WORKERS: "8"
  REQUEST_TIMEOUT: "30"
