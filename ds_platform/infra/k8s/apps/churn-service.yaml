apiVersion: v1
kind: Service
metadata:
  name: churn-service
  namespace: ds-platform
  labels:
    app: churn-service
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: churn-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-service
  namespace: ds-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-service
  template:
    metadata:
      labels:
        app: churn-service
    spec:
      containers:
      - name: churn-service
        image: churn-service:latest  # Replace with actual image
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: ds-platform-config
        - secretRef:
            name: ds-platform-secrets
        env:
        - name: SERVICE_NAME
          value: "churn-service"
        - name: DOMAIN
          value: "churn"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      restartPolicy: Always
