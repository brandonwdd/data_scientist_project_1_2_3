apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ds-platform-ingress
  namespace: ds-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod  # If using cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.your-domain.com
    - mlflow.your-domain.com
    secretName: ds-platform-tls
  rules:
  - host: api.your-domain.com
    http:
      paths:
      - path: /churn
        pathType: Prefix
        backend:
          service:
            name: churn-service
            port:
              number: 8000
      - path: /fraud
        pathType: Prefix
        backend:
          service:
            name: fraud-service
            port:
              number: 8000
      - path: /rag
        pathType: Prefix
        backend:
          service:
            name: rag-service
            port:
              number: 8000
  - host: mlflow.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mlflow-service
            port:
              number: 5000
